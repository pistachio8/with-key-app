name: "Setup pnpm + Node"
description: "Setup Node 20 + pnpm 10.7 + install deps with cache"
runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 10.7.0
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm
    - shell: bash
      run: pnpm install --frozen-lockfile
