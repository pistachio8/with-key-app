name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    name: Lint + Type + Unit
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          # check-spec-required가 git diff base...HEAD를 필요로 함.
          # fetch-depth: 0 = 전체 히스토리 (PR base와 비교 가능).
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm validate:docs
      - name: Check spec-required (soft — stderr 경고만, exit 0)
        if: github.event_name == 'pull_request'
        run: pnpm check:spec-required --base origin/${{ github.base_ref }}
      - run: pnpm test:ci

  integration:
    name: Integration (shared with-key project)
    needs: quick
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_CODENAME: with-key
      # 0038 의 reenable_on_auth_user_created RPC 가 쓰는 project ref guard.
      # cleanup 의 가드와 같은 변수명을 재사용해 일관성 유지.
      SUPABASE_CLEANUP_ALLOWED_REF: ohvcaytmzzwxkbxsmyny
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply pending migrations (no-op if up to date)
        run: bash scripts/ci/apply-migrations.sh
      - name: Re-enable on_auth_user_created trigger (외부 disable 회귀 봉합)
        # ADR-0018 §회귀 history 4회째 (1시간 이내 재발) 단기 봉합.
        # 0038 의 service_role security definer RPC 를 호출해 매 잡 시작 시 트리거 보장.
        # 근본 해결책은 ADR-0005 §후속 영향 (local Supabase 이전).
        run: pnpm test:integration:reenable-trigger
      - name: Run integration tests
        run: pnpm test:integration

  e2e:
    name: Playwright E2E
    needs: integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_CODENAME: with-key
      OPENAI_API_KEY: sk-dummy-ci
      OPENAI_MODEL: gpt-4o-mini
      AI_MONTHLY_BUDGET_KRW: "50000"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: dummy
      VAPID_PRIVATE_KEY: dummy
      VAPID_SUBJECT: mailto:ci@with-key.local
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright tests
        run: pnpm test:e2e
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results
          retention-days: 7
