<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>피드 타입 + 만회 찬스 — 인터랙티브 목업</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="css/withkey.css">
<style>
  body { background: var(--background); }
  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 72px; }
  .top { display: flex; flex-direction: column; gap: 12px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .brand { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 800; letter-spacing: -.02em; }
  .brand .mark { width: 24px; height: 24px; border-radius: 7px; background: var(--primary-strong); color: #fff; display: flex; align-items: center; justify-content: center; }
  .h-title { font-size: 26px; font-weight: 800; letter-spacing: -.02em; line-height: 1.2; text-wrap: balance; }
  .h-sub { font-size: 14px; color: var(--muted-foreground); line-height: 1.55; text-wrap: pretty; }
  .h-sub code { font-family: ui-monospace, Menlo, monospace; font-size: 12px; background: var(--muted); padding: 1px 6px; border-radius: 6px; color: var(--foreground); }
  .meta-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .group { margin-top: 30px; }
  .group h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; padding-left: 2px; }
  .rows { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .row-link { display: flex; align-items: center; gap: 12px; padding: 14px 16px; text-decoration: none; color: inherit; border-top: 1px solid var(--border); transition: background .15s; }
  .rows .row-link:first-child { border-top: 0; }
  .row-link:hover { background: color-mix(in srgb, var(--muted) 55%, transparent); }
  .row-link:focus-visible { outline: 2px solid var(--ring); outline-offset: -2px; }
  .rl-main { flex: 1; min-width: 0; }
  .rl-title { font-size: 14px; font-weight: 600; }
  .rl-desc { font-size: 12px; color: var(--muted-foreground); margin-top: 2px; line-height: 1.4; }
  .rl-wp { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; background: var(--primary-soft); color: #5163b3; white-space: nowrap; }
  .rl-wp.warn { background: var(--secondary-soft); color: #b88a13; }
  .chev { color: var(--muted-foreground); flex: 0 0 auto; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="mark"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg></span>with-key · 목업</div>
    <h1 class="h-title">피드 타입 + 만회 찬스 — 인터랙티브 화면</h1>
    <p class="h-sub">스펙 <code>2026-06-23-feed-type-penalty-redesign</code> · WP <code>EVAL-0042~0044</code>. 각 화면은 단독으로 열리는 인터랙티브 목업입니다(토글·캡처 타이머·스토리 재생 동작). 색·컴포넌트 기준은 <code>css/withkey.css</code>(DESIGN.md 토큰 미러). 화면 카피는 컨벤션 용어 <b>'만회 찬스'</b>로 통일(금액 '벌금'은 유지 · 코드 식별자 <code>penalty_*</code>·<code>/penalty</code> 유지).</p>
    <div class="meta-row">
      <span class="chip chip-primary">Phase 1 핵심 4</span>
      <span class="chip chip-secondary">기존 수정 2</span>
      <span class="chip chip-neutral">보강 5</span>
    </div>
  </div>
  <div id="groups"></div>
</div>
<script>
  var GROUPS = [
    { name: '신규 화면 — Phase 1 핵심', items: [
      { f: 'action-video.html', t: '영상 실시간 캡처 인증', wp: 'EVAL-0043', d: 'challenge/[id]/action · 갤러리 차단 · 꾹 눌러 3초 캡처 · 카메라 권한 거부' },
      { f: 'recap-story.html', t: '영상 결과물 = 스토리 자동재생', wp: 'EVAL-0043', d: "challenge/[id]/recap · feed_type='video' 클립 순서 재생" },
      { f: 'penalty-submit.html', t: '만회 미션 녹화·제출 (본인)', wp: 'EVAL-0044', d: 'challenge/[id]/penalty · 미션 카드 · 면제/2배 이월 · 제출 후 판정 대기' },
      { f: 'penalty-review.html', t: '만회 증명 판정 (동료)', wp: 'EVAL-0044', d: 'challenge/[id]/penalty · 증명 영상 재생 · 인정/반려 토글(기본 인정·익명)' }
    ]},
    { name: '기존 화면 수정', items: [
      { f: 'challenge-new.html', warn: true, t: '챌린지 생성 폼', wp: 'EVAL-0042/0043', d: '(flow)/challenge/new · 피드 타입 토글(이미지/3초 영상) + 만회 미션 입력' },
      { f: 'home.html', warn: true, t: '홈 — 만회 찬스 대기 섹션', wp: 'EVAL-0044', d: '(app)/home · settlement 패턴 미러 · 수행/판정 진입 · 창2 오픈 푸시 1회' }
    ]},
    { name: '보강 화면 (상태·역할 분기)', items: [
      { f: 'penalty-result.html', t: '만회 결과 — 면제 성공', wp: 'EVAL-0044', d: '동료 인정 → 벌금 0원, 면제 영수증' },
      { f: 'penalty-result.html?r=rejected', t: '만회 결과 — 2배 이월', wp: 'EVAL-0044', d: '반려/만료 → 다음 정산에 6,000원 carry-over' },
      { f: 'penalty-review.html?state=empty', t: '만회 판정 — 미제출 대기', wp: 'EVAL-0044', d: '증명 도착 전 동료의 빈/대기 상태' },
      { f: 'recap-story.html?state=empty', t: '영상 회고 — 빈 상태', wp: 'EVAL-0043', d: '클립 0개일 때 (이미지 recap 침묵 렌더 버그의 영상판)' },
      { f: 'challenge-feed.html', t: '인증 피드 — 영상 카드', wp: 'EVAL-0043', d: 'challenge-feed · 3초 클립 인라인 재생 + 익명 반려' }
    ]}
  ];
  var root = document.getElementById('groups');
  var CHEV = '<svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';
  GROUPS.forEach(function (g) {
    var sec = document.createElement('section'); sec.className = 'group';
    var h = document.createElement('h2'); h.textContent = g.name; sec.appendChild(h);
    var rows = document.createElement('div'); rows.className = 'rows';
    g.items.forEach(function (it) {
      var a = document.createElement('a'); a.className = 'row-link'; a.href = it.f;
      a.innerHTML =
        '<div class="rl-main"><div class="rl-title">' + it.t + '</div><div class="rl-desc">' + it.d + '</div></div>' +
        '<span class="rl-wp' + (it.warn ? ' warn' : '') + '">' + it.wp + '</span>' + CHEV;
      rows.appendChild(a);
    });
    sec.appendChild(rows); root.appendChild(sec);
  });
</script>
</body>
</html>
