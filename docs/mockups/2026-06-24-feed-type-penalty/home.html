<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>홈 · with-key</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="css/withkey.css">
<style>
  .brand { display: flex; align-items: center; gap: 7px; font-size: 18px; font-weight: 800; letter-spacing: -.02em; }
  .brand .mark { width: 26px; height: 26px; border-radius: 8px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; }
  .home-body { padding: 12px 16px 96px; display: flex; flex-direction: column; gap: 14px; }
  .greet { padding: 6px 4px 2px; }
  .row-end { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .chev { color: var(--muted-foreground); flex: 0 0 auto; }
  .push { position: absolute; top: 10px; left: 16px; right: 16px; z-index: 40; display: flex; gap: 10px; align-items: flex-start;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px 12px 12px 14px; box-shadow: var(--shadow-pop);
    animation: drop .4s var(--ease); }
  @keyframes drop { from { transform: translateY(-12px); opacity: 0; } }
  .push .p-ic { width: 34px; height: 34px; border-radius: 10px; background: var(--secondary-soft); color: #c79a26; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
  .fab-dock { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 35; }
</style>
</head>
<body>
<div class="screen">
  <!-- 창2 오픈 푸시 1회 (EVAL-0044) -->
  <div class="push" id="push">
    <span class="p-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg></span>
    <div style="flex:1">
      <p class="t-body" style="font-weight:700">만회 찬스가 열렸어요</p>
      <p class="t-sub">‘새벽기상 4인방’ 미션을 영상으로 해내면 벌금 3,000원이 면제돼요. 마감 D-2</p>
    </div>
    <button class="icon-btn" id="pushX" aria-label="닫기" style="width:30px;height:30px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <header class="app-header">
    <div class="brand"><span class="mark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg></span>with-key</div>
    <div class="row" style="gap:2px">
      <button class="icon-btn" aria-label="알림">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 21a1.9 1.9 0 0 0 3.4 0"/><path d="M21 17H3l1.5-2.3V11a7.5 7.5 0 0 1 15 0v3.7L21 17z"/></svg>
      </button>
      <button class="icon-btn" aria-label="마이페이지">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      </button>
    </div>
  </header>

  <div class="home-body">
    <div class="greet">
      <p class="t-sub">민지님, 좋은 아침이에요 ☀️</p>
      <h1 class="t-h2" style="margin-top:2px">오늘의 챌린지를 챙겨볼까요?</h1>
    </div>

    <!-- 만회 찬스 대기 섹션 (신규, settlement-pending-list 미러) -->
    <section class="section" aria-labelledby="penaltyHead">
      <div class="section-head">
        <h2 class="t-h3" id="penaltyHead">만회 찬스 대기</h2>
        <span class="t-caption tnum">2개</span>
      </div>

      <!-- 본인이 미달자 → 수행하기 -->
      <a class="list-row" href="penalty-submit.html">
        <span class="thumb thumb-warn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg></span>
        <div class="list-main">
          <p class="list-title">새벽기상 4인방</p>
          <p class="list-meta"><span style="font-weight:700;color:#d9702f">내 만회 미션 수행</span><span class="dotsep">·</span><span class="tnum">D-2</span></p>
        </div>
        <span class="row-end"><span class="chip chip-warn">수행하기</span><svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      </a>

      <!-- 동료 → 판정하기 -->
      <a class="list-row" href="penalty-review.html">
        <span class="thumb thumb-blue"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"/></svg></span>
        <div class="list-main">
          <p class="list-title">미라클 모닝 클럽</p>
          <p class="list-meta"><span style="font-weight:600">지호님 증명 도착</span><span class="dotsep">·</span><span>판정 필요</span></p>
        </div>
        <span class="row-end"><span class="chip chip-primary">판정하기</span><svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      </a>
    </section>

    <!-- 정산 대기 (기존) -->
    <section class="section" aria-labelledby="settleHead">
      <div class="section-head">
        <h2 class="t-h3" id="settleHead">정산 대기</h2>
        <span class="t-caption tnum">1개</span>
      </div>
      <a class="list-row" href="recap-story.html">
        <span class="thumb thumb-yellow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4a2 2 0 0 1-2-2V4h6v3a2 2 0 0 1-2 2zM20 9h-2a2 2 0 0 1-2-2V4h6v3a2 2 0 0 1-2 2z"/><path d="M6 4h12v5a6 6 0 0 1-12 0V4zM9 21h6M12 15v6"/></svg></span>
        <div class="list-main">
          <p class="list-title">2주 홈트 챌린지</p>
          <p class="list-meta"><span style="font-weight:600">종료 · 정산하기</span><span class="dotsep">·</span><span class="tnum">모인 벌금 18,000원</span></p>
        </div>
        <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      </a>
    </section>

    <!-- 진행 중 (기존) -->
    <section class="section" aria-labelledby="runHead">
      <div class="section-head">
        <h2 class="t-h3" id="runHead">진행 중</h2>
        <span class="t-caption tnum">1개</span>
      </div>
      <a class="list-row" href="action-video.html">
        <span class="thumb thumb-pink"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m16 13 5.2 3.2A1 1 0 0 0 23 15.4V8.6a1 1 0 0 0-1.8-.8L16 11"/><rect x="1" y="6" width="15" height="12" rx="2"/></svg></span>
        <div class="list-main">
          <p class="list-title">새벽기상 4인방</p>
          <p class="list-meta"><span style="color:#d9702f;font-weight:600">오늘 미인증</span><span class="dotsep">·</span><span>DAY 5 · 영상 챌린지</span></p>
        </div>
        <span class="row-end"><span class="chip chip-warn">인증하기</span><svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      </a>
    </section>
  </div>

  <div class="fab-dock">
    <button class="fab" aria-label="인증하기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>
    </button>
  </div>
</div>
<script>
  document.getElementById('pushX').addEventListener('click', function () {
    document.getElementById('push').style.display = 'none';
  });
</script>

</body>
</html>
