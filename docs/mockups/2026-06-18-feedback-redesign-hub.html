<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>마이페이지 · 고객지원</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  /* with-key 디자인 토큰 (모킹업 v4 hex SoT — apps/web/src/app/globals.css) */
  :root {
    --bg: #f7f8fb;
    --surface: #ffffff;
    --fg: #22262e;
    --muted: #f0f1f5;
    --muted-fg: #6b6f79;
    --border: #e8ebf0;
    --primary: #8aa4ff;
    --primary-deep: #4f6ae0;
    --primary-soft: #e8edff;
    --secondary: #ffd46b;
    --secondary-soft: #fff5da;
    --accent: #bca6ff;
    --success: #52c28c;
    --radius: 14px;
    --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    --font-sans: "Pretendard", "Pretendard Variable", -apple-system,
      BlinkMacSystemFont, system-ui, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    --maxw: 460px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background:
      radial-gradient(120% 60% at 50% -10%, var(--primary-soft) 0%, transparent 55%),
      var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .app {
    position: relative; width: 100%; max-width: var(--maxw); min-height: 100dvh;
    margin: 0 auto; background: var(--bg);
    display: flex; flex-direction: column;
    box-shadow: 0 0 0 1px var(--border);
  }
  @media (min-width: 520px) {
    body { padding: 28px 0; }
    .app {
      min-height: auto; height: calc(100dvh - 56px);
      border-radius: 28px; overflow: hidden;
      box-shadow: 0 24px 70px -28px rgba(34, 38, 46, 0.4), 0 0 0 1px var(--border);
    }
  }
  .appbar {
    position: sticky; top: 0; z-index: 5;
    display: grid; grid-template-columns: 40px 1fr 40px; align-items: center; gap: 4px;
    padding: 10px 12px;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .appbar h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; text-align: center; }
  .scroll { flex: 1; overflow-y: auto; padding: 22px 18px 40px; }

  .lede h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.22; }
  .lede p {
    margin-top: 7px; font-size: 14px; font-weight: 500; line-height: 1.55;
    color: var(--muted-fg); text-wrap: pretty;
  }

  .grouplabel {
    margin: 26px 4px 9px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--muted-fg); text-transform: uppercase;
  }

  .menu {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .menu-row {
    display: flex; align-items: center; gap: 13px;
    padding: 15px 14px;
    text-decoration: none; color: inherit; cursor: pointer;
    transition: background 130ms var(--ease);
  }
  .menu-row:hover { background: var(--primary-soft); }
  .menu-row:active { background: color-mix(in srgb, var(--primary-soft) 75%, var(--primary)); }
  .menu-row + .menu-row { border-top: 1px solid var(--border); }
  .menu-ic {
    width: 42px; height: 42px; flex: none; border-radius: 12px;
    display: grid; place-items: center;
  }
  .menu-ic svg { width: 22px; height: 22px; stroke-width: 1.8; }
  .ic-write { background: var(--primary-soft); color: var(--primary-deep); }
  .ic-list  { background: var(--secondary-soft); color: #b98900; }
  .menu-txt { flex: 1; min-width: 0; }
  .menu-txt b { display: block; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .menu-txt small { font-size: 12.5px; font-weight: 500; color: var(--muted-fg); }
  .menu-row .count {
    font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums;
    background: var(--muted); color: var(--muted-fg);
    padding: 2px 9px; border-radius: 999px;
  }
  .menu-row .chev { color: #c2c7d2; flex: none; }
  .menu-row .chev svg { width: 19px; height: 19px; stroke-width: 2; display: block; }

  .note {
    margin-top: 16px; padding: 13px 14px;
    display: flex; gap: 9px; align-items: flex-start;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 12.5px; font-weight: 500; line-height: 1.5; color: var(--muted-fg);
  }
  .note svg { width: 16px; height: 16px; flex: none; margin-top: 1px; color: var(--success); stroke-width: 2; }
  .note b { color: var(--fg); font-weight: 600; }
</style>
</head>
<body>
  <main class="app" aria-label="마이페이지 고객지원">
    <header class="appbar" data-od-id="appbar">
      <span aria-hidden="true"></span>
      <h1>마이페이지</h1>
      <span aria-hidden="true"></span>
    </header>

    <div class="scroll">
      <section class="lede" data-od-id="lede">
        <h2>고객지원</h2>
        <p>불편한 점이나 아이디어를 보내고, 처리 상태를 확인할 수 있어요.</p>
      </section>

      <p class="grouplabel">개발자에게 건의하기</p>
      <nav class="menu" data-od-id="menu">
        <a class="menu-row" href="feedback-page-redesign.html">
          <span class="menu-ic ic-write">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9" stroke-linecap="round"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <span class="menu-txt">
            <b>건의 보내기</b>
            <small>버그 제보 · 기능 제안 · 사진 첨부</small>
          </span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </a>
        <a class="menu-row" href="feedback-history.html">
          <span class="menu-ic ic-list">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 6h11M9 12h11M9 18h7" stroke-linecap="round"/><circle cx="4.5" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="4.5" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="4.5" cy="18" r="1.3" fill="currentColor" stroke="none"/></svg>
          </span>
          <span class="menu-txt">
            <b>내 건의 내역</b>
            <small>접수 · 검토 중 · 반영됨 상태 보기</small>
          </span>
          <span class="count">4</span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </a>
      </nav>

      <div class="note" data-od-id="note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12.5l4.2 4.2L19 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>보내주신 건의는 <b>개발팀에게 바로 전달</b>돼요. 답변이 필요한 경우 가입하신 이메일로 연락드려요.</span>
      </div>
    </div>
  </main>
</body>
</html>
